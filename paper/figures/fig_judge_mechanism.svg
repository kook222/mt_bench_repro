<svg viewBox="0 42 900 378" xmlns="http://www.w3.org/2000/svg" style="background:white;font-family:'Segoe UI',Arial,sans-serif">
  <title>LLM-as-a-Judge: Three Evaluation Protocols</title>
  <defs>
    <marker id="a3" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#374151"/></marker>
    <marker id="a3g" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#059669"/></marker>
    <marker id="a3r" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#DC2626"/></marker>
    <filter id="s3" x="-5%" y="-5%" width="110%" height="120%"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#00000018"/></filter>
  </defs>

  <!-- ════ Panel (a): Single-grade ════ -->
  <rect x="8" y="50" width="265" height="355" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="140" y="73" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1F2937">(a)  Single-grade</text>

  <rect x="22" y="84" width="100" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2" filter="url(#s3)"/>
  <text x="72" y="101" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">Question</text>
  <text x="72" y="115" text-anchor="middle" font-size="9" fill="#1E40AF" font-style="italic">q</text>

  <rect x="140" y="84" width="120" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2" filter="url(#s3)"/>
  <text x="200" y="101" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">Model Answer</text>
  <text x="200" y="115" text-anchor="middle" font-size="9" fill="#1E40AF" font-style="italic">a</text>

  <path d="M72,124 L72,150 L140,150" fill="none" stroke="#374151" stroke-width="1.3"/>
  <path d="M200,124 L200,150 L140,150" fill="none" stroke="#374151" stroke-width="1.3"/>
  <line x1="140" y1="150" x2="140" y2="164" stroke="#374151" stroke-width="1.3" marker-end="url(#a3)"/>

  <rect x="75" y="164" width="130" height="46" rx="6" fill="#E5E7EB" stroke="#6B7280" stroke-width="1.3" filter="url(#s3)"/>
  <text x="140" y="183" text-anchor="middle" font-size="9.5" font-weight="700" fill="#374151">LLM Judge</text>
  <text x="140" y="198" text-anchor="middle" font-size="7.5" fill="#6B7280">one evaluation pass</text>

  <line x1="140" y1="210" x2="140" y2="230" stroke="#059669" stroke-width="1.3" marker-end="url(#a3g)"/>

  <rect x="68" y="230" width="144" height="50" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.3" filter="url(#s3)"/>
  <text x="140" y="250" text-anchor="middle" font-size="10" font-weight="700" fill="#065F46">Score</text>
  <text x="140" y="268" text-anchor="middle" font-size="10" fill="#065F46">1 &#x2013; 10</text>

  <text x="140" y="310" text-anchor="middle" font-size="7.5" fill="#9CA3AF" font-style="italic">Direct quality assessment</text>
  <text x="140" y="323" text-anchor="middle" font-size="7.5" fill="#9CA3AF" font-style="italic">without reference answer</text>

  <!-- ════ Panel (b): Pairwise ════ -->
  <rect x="282" y="50" width="340" height="355" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="452" y="73" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1F2937">(b)  Pairwise Comparison</text>

  <rect x="397" y="84" width="110" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2" filter="url(#s3)"/>
  <text x="452" y="101" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">Question</text>
  <text x="452" y="115" text-anchor="middle" font-size="9" fill="#1E40AF" font-style="italic">q</text>

  <path d="M452,124 L452,140 L345,140 L345,150" fill="none" stroke="#374151" stroke-width="1.3" marker-end="url(#a3)"/>
  <path d="M452,140 L559,140 L559,150" fill="none" stroke="#374151" stroke-width="1.3" marker-end="url(#a3)"/>

  <rect x="290" y="150" width="110" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2" filter="url(#s3)"/>
  <text x="345" y="168" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">Answer A</text>
  <text x="345" y="181" text-anchor="middle" font-size="7.5" fill="#1E40AF">(model output)</text>

  <rect x="504" y="150" width="110" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2" filter="url(#s3)"/>
  <text x="559" y="168" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">Answer B</text>
  <text x="559" y="181" text-anchor="middle" font-size="7.5" fill="#1E40AF">(model output)</text>

  <line x1="345" y1="190" x2="345" y2="210" stroke="#374151" stroke-width="1.3" marker-end="url(#a3)"/>
  <line x1="559" y1="190" x2="559" y2="210" stroke="#374151" stroke-width="1.3" marker-end="url(#a3)"/>

  <rect x="290" y="210" width="110" height="46" rx="6" fill="#E5E7EB" stroke="#6B7280" stroke-width="1.3" filter="url(#s3)"/>
  <text x="345" y="229" text-anchor="middle" font-size="8.5" font-weight="700" fill="#374151">Judge (A, B)</text>
  <text x="345" y="243" text-anchor="middle" font-size="7.5" fill="#6B7280">A presented first</text>

  <rect x="504" y="210" width="110" height="46" rx="6" fill="#E5E7EB" stroke="#6B7280" stroke-width="1.3" filter="url(#s3)"/>
  <text x="559" y="229" text-anchor="middle" font-size="8.5" font-weight="700" fill="#374151">Judge (B, A)</text>
  <text x="559" y="243" text-anchor="middle" font-size="7.5" fill="#6B7280">B presented first</text>

  <line x1="345" y1="256" x2="345" y2="274" stroke="#374151" stroke-width="1.3" marker-end="url(#a3)"/>
  <line x1="559" y1="256" x2="559" y2="274" stroke="#374151" stroke-width="1.3" marker-end="url(#a3)"/>

  <rect x="290" y="274" width="110" height="34" rx="5" fill="#FEF9C3" stroke="#CA8A04" stroke-width="1.1"/>
  <text x="345" y="287" text-anchor="middle" font-size="8" font-weight="600" fill="#713F12">winner_ab</text>
  <text x="345" y="300" text-anchor="middle" font-size="7.5" fill="#92400E">{A, B, or tie}</text>

  <rect x="504" y="274" width="110" height="34" rx="5" fill="#FEF9C3" stroke="#CA8A04" stroke-width="1.1"/>
  <text x="559" y="287" text-anchor="middle" font-size="8" font-weight="600" fill="#713F12">winner_ba</text>
  <text x="559" y="300" text-anchor="middle" font-size="7.5" fill="#92400E">{A, B, or tie}</text>

  <path d="M345,308 L345,322 L452,322" fill="none" stroke="#374151" stroke-width="1.3"/>
  <path d="M559,308 L559,322 L452,322" fill="none" stroke="#374151" stroke-width="1.3"/>
  <line x1="452" y1="322" x2="452" y2="332" stroke="#374151" stroke-width="1.3" marker-end="url(#a3)"/>

  <rect x="372" y="332" width="160" height="44" rx="6" fill="#F3E8FF" stroke="#7C3AED" stroke-width="1.3" filter="url(#s3)"/>
  <text x="452" y="350" text-anchor="middle" font-size="9" font-weight="700" fill="#5B21B6">Consistency Check</text>
  <text x="452" y="365" text-anchor="middle" font-size="7.5" fill="#6D28D9">winner_ab == winner_ba ?</text>

  <path d="M407,376 L352,390" fill="none" stroke="#059669" stroke-width="1.3" marker-end="url(#a3g)"/>
  <path d="M497,376 L548,390" fill="none" stroke="#DC2626" stroke-width="1.3" marker-end="url(#a3r)"/>

  <rect x="292" y="390" width="120" height="26" rx="5" fill="#D1FAE5" stroke="#059669" stroke-width="1.1"/>
  <text x="352" y="407" text-anchor="middle" font-size="8.5" font-weight="700" fill="#065F46">Match &#x2192; Winner</text>

  <rect x="462" y="390" width="130" height="26" rx="5" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.1"/>
  <text x="527" y="407" text-anchor="middle" font-size="8.5" font-weight="700" fill="#991B1B">Mismatch &#x2192; Tie</text>

  <!-- ════ Panel (c): Reference-guided — inputs in one row, no path crosses ════ -->
  <rect x="632" y="50" width="260" height="355" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="762" y="73" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1F2937">(c)  Reference-guided</text>

  <!-- Three inputs in one row -->
  <rect x="644" y="84" width="66" height="48" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2" filter="url(#s3)"/>
  <text x="677" y="103" text-anchor="middle" font-size="8.5" font-weight="600" fill="#1E40AF">Question</text>
  <text x="677" y="118" text-anchor="middle" font-size="9" fill="#1E40AF" font-style="italic">q</text>

  <rect x="718" y="84" width="72" height="48" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2" filter="url(#s3)"/>
  <text x="754" y="101" text-anchor="middle" font-size="8.5" font-weight="600" fill="#1E40AF">Model</text>
  <text x="754" y="113" text-anchor="middle" font-size="8.5" fill="#1E40AF">Answer</text>
  <text x="754" y="125" text-anchor="middle" font-size="8.5" fill="#1E40AF" font-style="italic">a</text>

  <rect x="798" y="84" width="76" height="48" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.3" filter="url(#s3)"/>
  <text x="836" y="101" text-anchor="middle" font-size="8.5" font-weight="600" fill="#4C1D95">Reference</text>
  <text x="836" y="113" text-anchor="middle" font-size="8.5" fill="#4C1D95">Answer</text>
  <text x="836" y="125" text-anchor="middle" font-size="8" fill="#4C1D95" font-style="italic">r</text>

  <!-- Straight-down arrows to horizontal bar -->
  <line x1="677" y1="132" x2="677" y2="146" stroke="#374151" stroke-width="1.3"/>
  <line x1="754" y1="132" x2="754" y2="146" stroke="#374151" stroke-width="1.3"/>
  <line x1="836" y1="132" x2="836" y2="146" stroke="#7C3AED" stroke-width="1.3"/>

  <!-- Horizontal bar -->
  <line x1="677" y1="146" x2="836" y2="146" stroke="#374151" stroke-width="1.3"/>

  <!-- Single arrow to LLM Judge -->
  <line x1="756" y1="146" x2="762" y2="162" stroke="#374151" stroke-width="1.3" marker-end="url(#a3)"/>

  <rect x="697" y="162" width="130" height="46" rx="6" fill="#E5E7EB" stroke="#6B7280" stroke-width="1.3" filter="url(#s3)"/>
  <text x="762" y="181" text-anchor="middle" font-size="9.5" font-weight="700" fill="#374151">LLM Judge</text>
  <text x="762" y="196" text-anchor="middle" font-size="7.5" fill="#6B7280">with reference context</text>

  <line x1="762" y1="208" x2="762" y2="228" stroke="#059669" stroke-width="1.3" marker-end="url(#a3g)"/>

  <rect x="692" y="228" width="140" height="50" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.3" filter="url(#s3)"/>
  <text x="762" y="248" text-anchor="middle" font-size="10" font-weight="700" fill="#065F46">Score</text>
  <text x="762" y="266" text-anchor="middle" font-size="10" fill="#065F46">1 &#x2013; 10</text>

  <text x="762" y="306" text-anchor="middle" font-size="7.5" fill="#9CA3AF" font-style="italic">Expert reference anchors</text>
  <text x="762" y="319" text-anchor="middle" font-size="7.5" fill="#9CA3AF" font-style="italic">the scoring rubric</text>
</svg>
