<svg viewBox="0 0 900 295" xmlns="http://www.w3.org/2000/svg" role="img" style="background:white;font-family:'Segoe UI',Arial,sans-serif">
  <title>Fig. 1. Back-Translation Verification Pipeline</title>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#374151"/>
    </marker>
    <marker id="arr-b" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#2563EB"/>
    </marker>
    <marker id="arr-g" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#059669"/>
    </marker>
    <marker id="arr-r" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#DC2626"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="20" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Fig. 1.  Back-Translation Verification Pipeline</text>
  <text x="450" y="36" text-anchor="middle" font-size="9" fill="#6B7280">Quality assessment procedure for Korean translation of MT-Bench (Phase 0)</text>

  <!-- Box 1: MT-Bench EN -->
  <rect x="14" y="52" width="126" height="52" rx="7" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.4" filter="url(#shadow)"/>
  <text x="77" y="74" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1E40AF">MT-Bench EN</text>
  <text x="77" y="90" text-anchor="middle" font-size="8.5" fill="#1E40AF">(80 questions)</text>

  <line x1="140" y1="78" x2="157" y2="78" stroke="#374151" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Box 2: Manual Translation -->
  <rect x="158" y="52" width="126" height="52" rx="7" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.4" filter="url(#shadow)"/>
  <text x="221" y="72" text-anchor="middle" font-size="9.5" font-weight="700" fill="#374151">Manual Korean</text>
  <text x="221" y="87" text-anchor="middle" font-size="8.5" fill="#374151">Translation</text>
  <text x="221" y="99" text-anchor="middle" font-size="7.5" fill="#9CA3AF">(human)</text>

  <line x1="284" y1="78" x2="301" y2="78" stroke="#374151" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Box 3: KO Questions -->
  <rect x="302" y="52" width="126" height="52" rx="7" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.4" filter="url(#shadow)"/>
  <text x="365" y="74" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1E40AF">KO Questions</text>
  <text x="365" y="90" text-anchor="middle" font-size="8.5" fill="#1E40AF">(80 questions)</text>

  <line x1="428" y1="78" x2="445" y2="78" stroke="#374151" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Box 4: GPT-4o Back-translation -->
  <rect x="446" y="52" width="126" height="52" rx="7" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.4" filter="url(#shadow)"/>
  <text x="509" y="72" text-anchor="middle" font-size="9.5" font-weight="700" fill="#374151">GPT-4o</text>
  <text x="509" y="87" text-anchor="middle" font-size="8.5" fill="#374151">Back-translation</text>
  <text x="509" y="99" text-anchor="middle" font-size="7.5" fill="#9CA3AF">(automated)</text>

  <line x1="572" y1="78" x2="589" y2="78" stroke="#374151" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Box 5: Back-translated EN -->
  <rect x="590" y="52" width="136" height="52" rx="7" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.4" filter="url(#shadow)"/>
  <text x="658" y="72" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1E40AF">Back-translated</text>
  <text x="658" y="87" text-anchor="middle" font-size="8.5" fill="#1E40AF">EN (80 qs.)</text>

  <!-- Step labels -->
  <text x="77"  y="118" text-anchor="middle" font-size="7" fill="#C0C0C0">Step 1</text>
  <text x="221" y="118" text-anchor="middle" font-size="7" fill="#C0C0C0">Step 2</text>
  <text x="365" y="118" text-anchor="middle" font-size="7" fill="#C0C0C0">Step 3</text>
  <text x="509" y="118" text-anchor="middle" font-size="7" fill="#C0C0C0">Step 4</text>
  <text x="658" y="118" text-anchor="middle" font-size="7" fill="#C0C0C0">Step 5</text>

  <!-- Down arrow from box 5 -->
  <line x1="658" y1="104" x2="658" y2="130" stroke="#374151" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="658" y="127" text-anchor="middle" font-size="7.5" fill="#6B7280" font-style="italic">Quality Assessment</text>

  <!-- Metric boxes -->
  <rect x="568" y="136" width="122" height="44" rx="6" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="629" y="154" text-anchor="middle" font-size="8.5" font-weight="700" fill="#92400E">BLEU Score</text>
  <text x="629" y="170" text-anchor="middle" font-size="7.5" fill="#92400E">(sentence-level)</text>

  <rect x="706" y="136" width="136" height="44" rx="6" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="774" y="154" text-anchor="middle" font-size="8.5" font-weight="700" fill="#92400E">LLM Semantic</text>
  <text x="774" y="170" text-anchor="middle" font-size="7.5" fill="#92400E">Score (1&#x2013;5)</text>

  <!-- Arrows to metric boxes -->
  <line x1="630" y1="130" x2="630" y2="135" stroke="#F59E0B" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="658" y1="130" x2="774" y2="135" stroke="#F59E0B" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Arrow to threshold box -->
  <line x1="700" y1="180" x2="700" y2="200" stroke="#374151" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Threshold decision box -->
  <rect x="620" y="200" width="160" height="46" rx="7" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.4" filter="url(#shadow)"/>
  <text x="700" y="218" text-anchor="middle" font-size="9.5" font-weight="700" fill="#991B1B">Threshold-based</text>
  <text x="700" y="234" text-anchor="middle" font-size="8.5" fill="#991B1B">Flagging</text>

  <!-- Pass branch -->
  <line x1="640" y1="246" x2="580" y2="258" stroke="#059669" stroke-width="1.4" marker-end="url(#arr-g)"/>
  <rect x="490" y="258" width="136" height="46" rx="7" fill="#D1FAE5" stroke="#059669" stroke-width="1.4" filter="url(#shadow)"/>
  <text x="558" y="276" text-anchor="middle" font-size="9.5" font-weight="700" fill="#065F46">Pass  &#x2713;</text>
  <text x="558" y="291" text-anchor="middle" font-size="8" fill="#065F46">Finalized</text>
  <text x="572" y="247" text-anchor="middle" font-size="7.5" fill="#059669" font-style="italic">meets threshold</text>

  <!-- Review branch -->
  <line x1="762" y1="246" x2="820" y2="258" stroke="#DC2626" stroke-width="1.4" marker-end="url(#arr-r)"/>
  <rect x="758" y="258" width="140" height="46" rx="7" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.4" filter="url(#shadow)"/>
  <text x="828" y="276" text-anchor="middle" font-size="9.5" font-weight="700" fill="#991B1B">Manual Review</text>
  <text x="828" y="291" text-anchor="middle" font-size="8" fill="#991B1B">&#x26; Revision</text>
  <text x="820" y="247" text-anchor="middle" font-size="7.5" fill="#DC2626" font-style="italic">below threshold</text>

  <!-- Feedback arc -->
  <path d="M 758 281 Q 450 320 428 104" fill="none" stroke="#2563EB" stroke-width="1.4" stroke-dasharray="6,3" marker-end="url(#arr-b)"/>
  <text x="575" y="285" text-anchor="middle" font-size="7.5" fill="#2563EB" font-style="italic">revised &#x26; re-confirmed</text>

  <!-- Legend -->
  <rect x="14" y="258" width="12" height="10" rx="2" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="30" y="268" font-size="8" fill="#555">Data artifact</text>
  <rect x="98" y="258" width="12" height="10" rx="2" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
  <text x="114" y="268" font-size="8" fill="#555">Processing step</text>
  <rect x="198" y="258" width="12" height="10" rx="2" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="214" y="268" font-size="8" fill="#555">Quality metric</text>
  <rect x="292" y="258" width="12" height="10" rx="2" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="308" y="268" font-size="8" fill="#555">Decision node</text>
  <rect x="388" y="258" width="12" height="10" rx="2" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="404" y="268" font-size="8" fill="#555">Accepted output</text>
</svg>
